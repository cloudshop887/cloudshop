services:
  - type: web
    name: cloudshop-api
    env: python
    plan: standard
    buildCommand: |
      pip install -r api/requirements.txt && 
      npm install && 
      cd frontend && npm install && npm run build && 
      cd ..
    startCommand: |
      cd api && python index.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 10000
      - key: FLASK_ENV
        value: production
      - key: NODE_ENV
        value: production
